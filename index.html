                    results.push({ type: 'section', id: item.id, title: item.title, category: item.parent || 'General' });
                }
            });

            // Search Documents
            Object.keys(documents).forEach(sectionId => {
                const sectionDocs = documents[sectionId];
                sectionDocs.forEach(doc => {
                    const matchName = doc.name.toLowerCase().includes(lowQuery);
                    // Match summary only if no symbols are in query
                    const matchSummary = !hasSymbols && doc.summary && doc.summary.toLowerCase().includes(lowQuery);
                    
                    if (matchName || matchSummary) {
                        results.push({ type: 'document', id: sectionId, title: doc.name, category: 'Document' });
                    }
                });
            });

            return results.slice(0, 8); // Limit results

            };

            const nodeData = useMemo(() => findNodeAndPath(taxonomy, nodeId), [nodeId]);
            const docs = documents[nodeId] || [];

            if (!nodeData) {
                return (
                    <div className="content-page" style={{ padding: '20px', color: 'var(--text-muted)' }}>
                        <Icon name="alert-circle" size={32} />
                        <h3 style={{marginTop: '10px'}}>Section Not Found</h3>
                        <p>This category matches no known records or is currently empty.</p>
                    </div>
                );
            }

            const { node, path } = nodeData;
            const hasSubsections = node.children && node.children.length > 0;

            return (
                <div className="content-page">
                    {viewingDoc && <MarkdownViewer doc={viewingDoc} onClose={() => setViewingDoc(null)} />}
                    <div className="breadcrumb">
                        <span>Core</span>
                        <Icon name="chevron-right" size={12} />
                        {path.map((name, idx) => (
                            <React.Fragment key={`bc-${name}-${idx}`}>
                                <span className={idx === path.length - 1 ? 'current' : ''}>{name}</span>
                                {idx < path.length - 1 && <Icon name="chevron-right" size={12} />}
                            </React.Fragment>
                        ))}
                    </div>

                    <header className="page-header">
                        <h2>{path[path.length - 1]}</h2>
                        <p style={{fontSize: '1.1rem', maxWidth: '800px'}}>
                            {docs.length > 0 && docs[0].summary 
                                ? docs[0].summary 
                                : `Access high-authority standards, patterns, and architectural blueprints for the ${path[path.length - 1]} pillar.`
                            }
                        </p>
                    </header>

                    {hasSubsections && (
                        <div className="subsections-section" style={{marginBottom: '40px'}}>
                            <h3 className="section-title"><Icon name="layout" /> Sub-sections</h3>
                            <div className="stats-grid" style={{gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: '20px'}}>
                                {node.children.map(child => (
                                    <div key={child.id} className="card tile" onClick={() => onSelect(child.id)} style={{padding: '24px'}}>
                                        <div className="tile-icon" style={{width: '40px', height: '40px'}}>
                                            <Icon name={child.icon || (child.children ? 'folder' : 'file-text')} size={18} />
                                        </div>
                                        <h4 style={{margin: '0', fontSize: '0.95rem'}}>{child.title}</h4>
                                        <div style={{marginTop: 'auto', paddingTop: '12px', fontSize: '0.7rem', color: 'var(--accent)', fontWeight: 700}}>
                                            EXPLORE <Icon name="chevron-right" size={10} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <h3 className="section-title"><Icon name="files" /> Enterprise Documents</h3>
                    <div className="doc-list">
                        {docs.length > 0 ? docs.map((doc) => {
                            const getRelativeTime = (isoString) => {
                                if (!isoString) return doc.updated || 'Recently';
                                try {
                                    const diff = new Date() - new Date(isoString);
                                    const hours = Math.floor(diff / (1000 * 60 * 60));
                                    if (hours < 1) return 'Just now';
                                    if (hours < 24) return `Updated ${hours}h ago`;
                                    return `Updated ${Math.floor(hours / 24)}d ago`;
                                } catch (e) { return doc.updated; }
                            };

                            return (
                                <div key={doc.name} className="doc-item" style={{alignItems: 'flex-start'}}>
                                    <div className="doc-info" style={{alignItems: 'flex-start'}}>
                                        <div className="doc-type-icon" style={{marginTop: '4px'}}>
                                            <Icon name={doc.type === 'Guide' ? 'book-open' : (doc.type === 'Excel' ? 'file-excel' : (doc.type === 'PDF' ? 'file-pdf' : 'file-lines'))} />
                                        </div>
                                        <div style={{flex: 1}}>
                                            <span className="doc-name">{doc.name}</span>
                                            <div style={{display: 'flex', gap: '12px', alignItems: 'center', marginTop: '8px'}}>
                                                <span className="doc-meta" style={{fontSize: '0.75rem'}}>{doc.type} • {doc.size}</span>
                                                <span className="doc-meta" style={{fontSize: '0.75rem', color: 'var(--accent)', fontWeight: 600}}>
                                                    {getRelativeTime(doc.lastModified)}
                                                </span>
                                                {doc.downloadPath && (
                                                    <span style={{fontSize: '0.7rem', color: '#10b981', display: 'flex', alignItems: 'center', gap: '4px', fontWeight: 600}}>
                                                        <Icon name="check-circle" size={10} /> Sync with OneDrive
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div style={{display: 'flex', gap: '8px', flexShrink: 0}}>
                                        {doc.viewPath && (
                                            <button
                                                className="btn btn-primary"
                                                style={{display: 'flex', alignItems: 'center', gap: '8px', background: 'linear-gradient(135deg, var(--accent), #7c3aed)'}}
                                                onClick={() => setViewingDoc(doc)}
                                            >
                                                <Icon name="book-open" size={14} /> Read
                                            </button>
                                        )}
                                        {doc.downloadPath && (
                                            <a
                                                href={doc.downloadPath}
                                                download={doc.name}
                                                className="btn btn-outline"
                                                style={{textDecoration: 'none', display: 'flex', alignItems: 'center', gap: '8px'}}
                                            >
                                                <Icon name="download" size={14} /> Download
                                            </a>
                                        )}
                                        {!doc.viewPath && !doc.downloadPath && (
                                            <button className="btn btn-outline">
                                                Coming Soon
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        }) : (
                            <div className="card" style={{padding: '30px', textAlign: 'center', background: 'var(--bg-main)', borderStyle: 'dashed'}}>
                                <Icon name="file-lines" size={24} style={{opacity: 0.3, marginBottom: '12px'}} />
                                <p style={{color: 'var(--text-muted)', fontSize: '0.9rem', margin: 0}}>
                                    {hasSubsections 
                                        ? "Select a sub-section above to view specific documentation." 
                                        : "No direct documents found for this section yet."
                                    }
                                </p>
                            </div>
                        )}
                    </div>

                    <div className="related-links" style={{marginTop: '40px'}}>
                        <h3 className="section-title"><Icon name="link" /> Related Resources</h3>
                        <div className="card">
                            <p style={{color: 'var(--accent)', cursor: 'pointer'}}>Internal Knowledge Base Search</p>
                            <hr style={{margin: '12px 0', opacity: 0.1}} />
                            <p style={{color: 'var(--accent)', cursor: 'pointer'}}>Data Governance Portal</p>
                        </div>
                    </div>
                </div>
            );
        };

        const StartPage = ({ onEnter }) => {
            const [isExiting, setIsExiting] = useState(false);
            const [empId, setEmpId] = useState('');
            const [accessCode, setAccessCode] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                setIsExiting(true);
                sessionStorage.setItem('coeAuth', 'true');
                setTimeout(() => onEnter(), 800); // Match CSS transition
            };

            const stats = [
                { value: "500+", label: "Assets" },
                { value: "24", label: "Frameworks" },
                { value: "8", label: "Core Pillars" }
            ];

            return (
                <div className={`start-page ${isExiting ? 'fade-out' : ''}`}>
                    <div className="login-card">
                        <div style={{ marginBottom: '24px' }}>
                            <div className="avatar" style={{ width: '60px', height: '60px', fontSize: '1.5rem', margin: '0 auto 16px' }}>SA</div>
                            <h2>Centre of Excellence</h2>
                            <p>Smart Analytica Knowledge Hub</p>
                        </div>

                        <form className="login-form" onSubmit={handleLogin}>
                            <div className="login-input-group">
                                <label>Employee ID</label>
                                <input 
                                    type="text" 
                                    placeholder="Enter your ID..." 
                                    value={empId}
                                    onChange={(e) => setEmpId(e.target.value)}
                                    required
                                />
                            </div>
                            <div className="login-input-group" style={{ marginBottom: '8px' }}>
                                <label>Access Code</label>
                                <input 
                                    type="password" 
                                    placeholder="••••••••" 
                                    value={accessCode}
                                    onChange={(e) => setAccessCode(e.target.value)}
                                    required
                                />
                            </div>
                            <button type="submit" className="login-btn">
                                Authenticate & Enter Portal <Icon name="arrow-right" size={16} />
                            </button>
                        </form>
                    </div>

                    <div className="start-stats-row">
                        {stats.map(stat => (
                            <div key={stat.label} className="start-stat-item">
                                <span className="start-stat-value">{stat.value}</span>
                                <span className="start-stat-label">{stat.label}</span>
                            </div>
                        ))}
                    </div>

                    <div style={{ position: 'absolute', bottom: '40px', color: 'rgba(255,255,255,0.3)', fontSize: '0.75rem', fontWeight: 600 }}>
                        POWERED BY SMART ANALYTICA AI ENGINE
                    </div>
                </div>
            );
        };

        const App = () => {
            const [authorized, setAuthorized] = useState(sessionStorage.getItem('coeAuth') === 'true');
            const [activeId, setActiveId] = useState(window.location.hash.replace('#/', '') || 'home');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(window.innerWidth < 768);
            const [theme, setTheme] = useState('dark');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);

            // Handle browser history (Back/Forward)
            useEffect(() => {
                const handleHashChange = () => {
                    const hashId = window.location.hash.replace('#/', '') || 'home';
                    setActiveId(hashId);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            // Handle responsive sidebar state
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 768) {
                        setSidebarCollapsed(false);
                    } else {
                        setSidebarCollapsed(true);
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                document.body.setAttribute('data-theme', theme);
            }, [theme]);

            const handleNavigate = (id) => {
                window.location.hash = `#/${id}`;
                setSearchQuery('');
                setSearchResults([]);
                // Auto-close sidebar on mobile after selection
                if (window.innerWidth < 768) {
                    setSidebarCollapsed(true);
                }
            };

            const handleSearchChange = (query) => {
                setSearchQuery(query);
                setSearchResults(searchData(query));
            };

            if (!authorized) {
                return <StartPage onEnter={() => setAuthorized(true)} />;
            }

            return (
                <div className="app-container">
                    <div 
                        className={`sidebar-overlay ${!sidebarCollapsed && window.innerWidth < 768 ? 'visible' : ''}`} 
                        onClick={() => setSidebarCollapsed(true)} 
                    />
                    <Sidebar 
                        taxonomy={taxonomy} 
                        activeId={activeId} 
                        onSelect={handleNavigate} 
                        collapsed={sidebarCollapsed} 
                    />
                    <main className="main-wrapper">
                        <Navbar 
                            onToggleSidebar={() => setSidebarCollapsed(!sidebarCollapsed)} 
                            theme={theme} 
                            onToggleTheme={() => setTheme(prev => prev === 'light' ? 'dark' : 'light')} 
                            searchQuery={searchQuery}
                            onSearch={handleSearchChange}
                        />
                        <div className="content-area" style={{ position: 'relative' }}>
                            <SearchDropdown 
                                results={searchResults} 
                                onSelect={handleNavigate} 
                                onClose={() => { setSearchQuery(''); setSearchResults([]); }}
                            />
                            {activeId === 'home' ? <Dashboard onSelect={handleNavigate} /> : <ContentPage nodeId={activeId} onSelect={handleNavigate} />}
                        </div>
                        <NewsTicker />
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
