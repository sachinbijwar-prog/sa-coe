<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Analytica | Centre of Excellence</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for stable icons (No DOM mutation crashes) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- React and Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Combined Data and Logic for maximum reliability on local file protocol -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Mock Data ---
        const taxonomy = [
            { id: "home", title: "HOME", icon: "Home" },
            { id: "app-kb", title: "APPLICATION KNOWLEDGE BASE", icon: "BookOpen", children: [
                { id: "informatica", title: "Informatica Migration & Best Practices" },
                { id: "app-cdp", title: "Application Integration with CDP" },
                { id: "etl-tooling", title: "ETL Tooling" },
            ]},
            { id: "platform-kb", title: "PLATFORM KNOWLEDGE BASE", icon: "Server", children: [
                { id: "cloudera-overview", title: "Cloudera Platform Overview" },
                { id: "platform-migration", title: "Platform Migration & Operations" },
            ]},
            { id: "dwh-arch", title: "DATA WAREHOUSE ARCHITECTURE", icon: "Layers", children: [
                { id: "dwh-overview", title: "DWH Architectural Overview" },
                { id: "data-modeling", title: "Data Modeling Standards" },
                { id: "data-ingestion", title: "Data Ingestion Layer" },
                { id: "etl-transformation", title: "ETL/ELT Transformation Layer" },
                { id: "data-quality", title: "Data Quality & Validation Framework" },
                { id: "metadata-lineage", title: "Metadata & Lineage" },
                { id: "data-governance", title: "Data Governance & Compliance" },
                { id: "performance-optimization", title: "Performance & Optimization" },
                { id: "data-retention", title: "Data Retention & Archival" },
                { id: "reporting-layer", title: "Reporting & Consumption Layer" },
                { id: "monitoring-observability", title: "Monitoring & Observability" },
                { id: "design-patterns", title: "Best Practices & Design Patterns" },
                { id: "troubleshooting", title: "Common Issues & Troubleshooting" },
            ]},
            { id: "cdp-migration", title: "CDP MIGRATION KNOWLEDGE BASE", icon: "ArrowRightCircle", children: [
                { id: "migration-strategy", title: "Migration Planning & Strategy" },
                { id: "hive-migration", title: "Hive Migration" },
                { id: "impala-migration", title: "Impala Migration" },
                { id: "spark-migration", title: "Spark Migration" },
                { id: "hdfs-migration", title: "HDFS Migration" },
                { id: "security-migration", title: "Security & Governance Migration" },
                { id: "workflow-migration", title: "Workflow & Orchestration Migration" },
                { id: "etl-integration", title: "Informatica & ETL Integration" },
                { id: "post-migration", title: "Post-Migration Operations" },
                { id: "validation-benchmarking", title: "Validation & Benchmarking" },
            ]},
            { id: "accelerators", title: "REUSABLE ACCELERATORS", icon: "Zap", children: [
                { id: "etl-templates", title: "ETL Templates" },
                { id: "val-framework", title: "Data Validation Framework" },
                { id: "sql-library", title: "SQL Script Library" },
                { id: "auto-scripts", title: "Automation Scripts" },
                { id: "audit-framework", title: "Audit & Reconciliation Framework" },
            ]},
            { id: "troubleshooting-prod", title: "TROUBLESHOOTING & PRODUCTION ISSUES", icon: "AlertTriangle", children: [
                { id: "hive-issues", title: "Hive Issues" },
                { id: "spark-issues", title: "Spark Issues" },
                { id: "etl-failures", title: "ETL Failures" },
                { id: "data-issues", title: "Data Issues" },
            ]},
            { id: "onboarding", title: "PROJECT ONBOARDING KIT", icon: "UserPlus", children: [
                { id: "arch-diagrams", title: "Architecture Diagrams" },
                { id: "data-flow", title: "Data Flow" },
                { id: "access-checklist", title: "Access Checklist" },
                { id: "env-setup", title: "Environment Setup" },
                { id: "runbooks", title: "Runbooks" },
            ]},
            { id: "metrics", title: "METRICS & INSIGHTS", icon: "TrendingUp" }
        ];

        const documents = {
            "dwh-overview": [
                { 
                    name: "dwh_architectural_overview.xlsx", 
                    type: "Excel", 
                    updated: "2026-04-17", 
                    lastModified: "2026-04-17T12:00:00Z",
                    size: "8.5 KB",
                    downloadPath: "downloads/dwh_architectural_overview.xlsx",
                    summary: "Enterprise blueprint outlining the multi-layer storage architecture, compute fabric (Spark/Impala), and metadata management strategy. Defines the standard for data ingestion from legacy sources to the modern data lake."
                }
            ],
            "data-modeling": [
                { 
                    name: "data_modeling_standards.xlsx", 
                    type: "Excel", 
                    updated: "2026-04-17", 
                    lastModified: "2026-04-17T10:00:00Z",
                    size: "8.5 KB",
                    downloadPath: "downloads/data_modeling_standards.xlsx",
                    summary: "Technical guidelines for robust schema design, including naming conventions, indexing strategies, and dimensional modeling patterns (Star/Snowflake). Ensures consistency across development teams."
                }
            ],
            "val-framework": [
                { 
                    name: "Data Validation Framework Overview.pdf", 
                    type: "PDF", 
                    updated: "2026-04-17", 
                    lastModified: "2026-04-17T08:00:00Z",
                    size: "2.4 MB",
                    summary: "Strategic guide for cross-platform data integrity verification using automated quality gates."
                },
                { name: "Validation Rules Template.xlsx", type: "Excel", updated: "2024-03-12", size: "1.1 MB" },
                { name: "DVF Implementation Guide.docx", type: "Doc", updated: "2024-03-05", size: "850 KB" }
            ],
            "etl-templates": [
                { 
                    name: "Standard ETL Pattern.pdf", 
                    type: "PDF", 
                    updated: "2024-02-15", 
                    size: "1.8 MB",
                    summary: "Standardized templates for Informatica and Spark mapping developers to accelerate development cycles."
                },
                { name: "Informatica Mapping Template.xml", type: "Other", updated: "2024-02-20", size: "45 KB" }
            ]
        };

        const featuredAccelerators = [
            { id: "val-framework", title: "Data Validation Framework", description: "Standardized tool for verifying data integrity across platforms.", icon: "Shield" },
            { id: "etl-templates", title: "ETL Templates", description: "Reusable Informatica and Spark templates for faster development.", icon: "Zap" },
            { id: "troubleshooting", title: "Troubleshooting Guide", description: "Comprehensive library of known issues and resolution steps.", icon: "Search" },
            { id: "onboarding", title: "Onboarding Kit", description: "Everything you need to get started with the CoE platform.", icon: "UserPlus" }
        ];

        // --- Components ---

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Portal Crash:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px', textAlign: 'center', fontFamily: 'sans-serif' }}>
                            <h2 style={{color: '#ef4444'}}>Application Error</h2>
                            <p>The UI encountered an unexpected error during navigation.</p>
                            <button 
                                onClick={() => window.location.reload()} 
                                style={{ padding: '10px 20px', backgroundColor: '#4f46e5', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', marginTop: '20px' }}
                            >
                                Reload Portal
                            </button>
                            <pre style={{ marginTop: '20px', fontSize: '12px', color: '#64748b', textAlign: 'left', background: '#f8fafc', padding: '15px' }}>
                                {this.state.error && this.state.error.toString()}
                            </pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Components ---
        const Icon = ({ name, size = 18, className = "" }) => {
            if (!name) return null;
            
            // Map Lucide names to FontAwesome classes
            const iconMap = {
                'home': 'fa-house',
                'bookopen': 'fa-book-open',
                'server': 'fa-server',
                'layers': 'fa-layer-group',
                'arrowrightcircle': 'fa-circle-chevron-right',
                'checkcircle': 'fa-circle-check',
                'barchart': 'fa-chart-column',
                'menu': 'fa-bars',
                'activity': 'fa-chart-line',
                'files': 'fa-folder-tree',
                'file-text': 'fa-file-lines',
                'folder': 'fa-folder',
                'external-link': 'fa-up-right-from-square',
                'shield': 'fa-shield',
                'alert-circle': 'fa-circle-exclamation',
                'sun': 'fa-sun',
                'moon': 'fa-moon',
                'file-excel': 'fa-file-excel',
                'file-pdf': 'fa-file-pdf',
                'file-lines': 'fa-file-lines',
                'copy': 'fa-copy'
            };

            const cleanName = name.toLowerCase().replace(/-/g, '');
            const faClass = iconMap[cleanName] || iconMap[name.toLowerCase()] || 'fa-file';
            
            return (
                <i 
                    className={`fa-solid ${faClass} ${className}`} 
                    style={{ 
                        fontSize: `${size}px`, 
                        width: `${size}px`,
                        height: `${size}px`,
                        display: 'inline-flex', 
                        alignItems: 'center', 
                        justifyContent: 'center' 
                    }}
                ></i>
            );
        };

        const TreeNode = ({ node, activeId, onSelect, level = 0 }) => {
            const [expanded, setExpanded] = useState(false);
            const hasChildren = node.children && node.children.length > 0;
            const isActive = activeId === node.id;

            return (
                <div className="tree-item">
                    <div className={`tree-node ${isActive ? 'active' : ''}`} 
                         onClick={(e) => { e.stopPropagation(); if(hasChildren) setExpanded(!expanded); onSelect(node.id); }}
                         style={{ paddingLeft: `${16 + level * 16}px` }}>
                        <div className="tree-node-icon"><Icon name={node.icon || (hasChildren ? 'folder' : 'file-text')} size={16} /></div>
                        <span className="tree-node-label">{node.title}</span>
                        {hasChildren && <Icon name="chevron-right" size={14} className={`tree-node-arrow ${expanded ? 'expanded' : ''}`} />}
                    </div>
                    {hasChildren && (
                        <div className={`tree-children-container ${expanded ? 'expanded' : ''}`}>
                            <div className="tree-children">
                                {node.children.map(child => <TreeNode key={child.id} node={child} activeId={activeId} onSelect={onSelect} level={level + 1} />)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Sidebar = ({ taxonomy, activeId, onSelect, collapsed }) => (
            <aside className={`sidebar ${collapsed ? 'collapsed' : ''}`}>
                <div className="sidebar-header">
                    <Icon name="activity" size={24} style={{color: 'var(--accent)'}} />
                    <span className="logo-text">CoE Portal</span>
                </div>
                <div className="sidebar-content">
                    {taxonomy.map(node => <TreeNode key={node.id} node={node} activeId={activeId} onSelect={onSelect} />)}
                </div>
            </aside>
        );

        const Navbar = ({ onToggleSidebar, theme, onToggleTheme }) => (
            <nav className="navbar">
                <div className="nav-icon-btn" onClick={onToggleSidebar}><Icon name="menu" /></div>
                <div className="search-bar"><Icon name="search" size={16} /><input type="text" placeholder="Search knowledge base..." /></div>
                <div className="nav-actions">
                    <div className="theme-toggle" onClick={onToggleTheme}>
                        <Icon name={theme === 'light' ? 'moon' : 'sun'} size={18} />
                    </div>
                    <div className="nav-icon-btn"><Icon name="bell" /></div>
                    <div className="user-profile">
                        <div className="avatar">SA</div>
                        <span style={{fontSize: '0.85rem', fontWeight: 600, color: 'var(--text-main)'}}>Sachin B.</span>
                    </div>
                </div>
            </nav>
        );

        const Dashboard = ({ onSelect }) => (
            <div className="dashboard-view">
                <header className="hero">
                    <div className="hero-brand">
                        <img src="logo.png" alt="Smart Analytica" className="hero-logo" />
                        <h1>Smart Analytica CoE Portfolio</h1>
                    </div>
                    <p>Intelligence & Data Engineering Excellence Hub</p>
                </header>
                <div className="stats-grid">
                    {featuredAccelerators.map(item => (
                        <div key={item.id} className="card tile" onClick={() => onSelect(item.id)}>
                            <div className="tile-icon"><Icon name={item.icon} size={22} /></div>
                            <h3>{item.title}</h3>
                            <p>{item.description}</p>
                            <div style={{marginTop: '20px', fontSize: '0.75rem', color: 'var(--accent)', fontWeight: 700, display: 'flex', alignItems: 'center', gap: '8px'}}>
                                VIEW DETAILS <Icon name="chevron-right" size={12} />
                            </div>
                        </div>
                    ))}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.5fr) minmax(0, 1fr)', gap: '40px' }}>
                    <section>
                        <h3 className="section-title"><Icon name="link" /> Ecosystem Quick Links</h3>
                        <div className="card" style={{padding: '0'}}>
                            <ul style={{ listStyle: 'none' }}>
                                {[
                                    { name: 'Azure Data Factory Portal', type: 'Platform' },
                                    { name: 'Cloudera Manager Dashboard', type: 'Operations' },
                                    { name: 'Power BI Metrics Hub', type: 'Analytics' }
                                ].map((link, idx) => (
                                    <li key={link.name} style={{ 
                                        padding: '16px 24px', 
                                        borderBottom: idx === 2 ? 'none' : '1px solid var(--border)', 
                                        display: 'flex', 
                                        justifyContent: 'space-between',
                                        alignItems: 'center',
                                        cursor: 'pointer' 
                                    }}>
                                        <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                                            <Icon name="external-link" size={14} style={{ color: 'var(--accent)' }} />
                                            <span style={{fontWeight: 600}}>{link.name}</span>
                                        </div>
                                        <span style={{fontSize: '0.7rem', background: 'var(--bg-main)', padding: '2px 8px', borderRadius: '4px', color: 'var(--text-muted)'}}>{link.type}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </section>
                    <section>
                        <h3 className="section-title"><Icon name="clock" /> Recent Publications</h3>
                        <div className="doc-list">
                            <div className="card" style={{padding: '20px'}}>
                                <div style={{marginBottom: '16px', display: 'flex', gap: '16px'}}>
                                    <div style={{width: '4px', background: 'var(--accent)', borderRadius: '2px'}}></div>
                                    <div>
                                        <small style={{color: 'var(--text-muted)', fontWeight: 600, fontSize: '0.7rem'}}>MAR 24, 2024 • ARCHITECTURE</small>
                                        <p style={{fontWeight: '700', marginTop: '4px'}}>Hive vs Impala Performance Patterns</p>
                                    </div>
                                </div>
                                <div style={{display: 'flex', gap: '16px'}}>
                                    <div style={{width: '4px', background: 'var(--border)', borderRadius: '2px'}}></div>
                                    <div>
                                        <small style={{color: 'var(--text-muted)', fontWeight: 600, fontSize: '0.7rem'}}>MAR 20, 2024 • OPTIMIZATION</small>
                                        <p style={{fontWeight: '700', marginTop: '4px'}}>Spark Memory Management Tuning</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                <footer className="footer" style={{
                    padding: '20px', 
                    textAlign: 'center', 
                    fontSize: '0.9rem', 
                    color: 'var(--text-muted)',
                    borderTop: '1px solid var(--border)',
                    marginTop: '40px'
                }}>
                    © 2024 Smart Analytica India Private Limited. All rights reserved.
                </footer>
            </div>
        );

        const ContentPage = ({ nodeId }) => {
            const findNodePath = (nodes, id, path = []) => {
                for (const node of nodes) {
                    if (node.id === id) return [...path, node.title];
                    if (node.children) {
                        const childPath = findNodePath(node.children, id, [...path, node.title]);
                        if (childPath) return childPath;
                    }
                }
                return null;
            };

            const path = useMemo(() => findNodePath(taxonomy, nodeId), [nodeId]);
            const docs = documents[nodeId] || [];

            if (!path) {
                return (
                    <div className="content-page" style={{ padding: '20px', color: 'var(--text-muted)' }}>
                        <Icon name="alert-circle" size={32} />
                        <h3 style={{marginTop: '10px'}}>Section Not Found</h3>
                        <p>This category matches no known records or is currently empty.</p>
                    </div>
                );
            }

            return (
                <div className="content-page">
                    <div className="sidebar-brand">
                        <img src="logo.png" alt="Logo" className="sidebar-logo" />
                        <div className="brand-text">
                            <span className="brand-main">Smart</span>
                            <span className="brand-sub">Analytica</span>
                        </div>
                    </div>
                    <div className="breadcrumb">
                        <span>Core</span>
                        <Icon name="chevron-right" size={12} />
                        {path.map((name, idx) => (
                            <React.Fragment key={`bc-${name}-${idx}`}>
                                <span className={idx === path.length - 1 ? 'current' : ''}>{name}</span>
                                {idx < path.length - 1 && <Icon name="chevron-right" size={12} />}
                            </React.Fragment>
                        ))}
                    </div>

                    <header className="page-header">
                        <h2>{path[path.length - 1]}</h2>
                        <p style={{fontSize: '1.1rem', maxWidth: '800px'}}>
                            {docs.length > 0 && docs[0].summary 
                                ? docs[0].summary 
                                : `Access high-authority standards, patterns, and architectural blueprints for the ${path[path.length - 1]} pillar.`
                            }
                        </p>
                    </header>

                    <h3 className="section-title"><Icon name="files" /> Enterprise Documents</h3>
                    <div className="doc-list">
                        {docs.length > 0 ? docs.map((doc) => {
                            const getRelativeTime = (isoString) => {
                                if (!isoString) return doc.updated || 'Recently';
                                try {
                                    const diff = new Date() - new Date(isoString);
                                    const hours = Math.floor(diff / (1000 * 60 * 60));
                                    if (hours < 1) return 'Just now';
                                    if (hours < 24) return `Updated ${hours}h ago`;
                                    return `Updated ${Math.floor(hours / 24)}d ago`;
                                } catch (e) { return doc.updated; }
                            };

                            return (
                                <div key={doc.name} className="doc-item" style={{alignItems: 'flex-start'}}>
                                    <div className="doc-info" style={{alignItems: 'flex-start'}}>
                                        <div className="doc-type-icon" style={{marginTop: '4px'}}>
                                            <Icon name={doc.type === 'Excel' ? 'file-excel' : (doc.type === 'PDF' ? 'file-pdf' : 'file-lines')} />
                                        </div>
                                        <div style={{flex: 1}}>
                                            <span className="doc-name">{doc.name}</span>
                                            <div style={{display: 'flex', gap: '12px', alignItems: 'center', marginTop: '8px'}}>
                                                <span className="doc-meta" style={{fontSize: '0.75rem'}}>{doc.type} • {doc.size}</span>
                                                <span className="doc-meta" style={{fontSize: '0.75rem', color: 'var(--accent)', fontWeight: 600}}>
                                                    {getRelativeTime(doc.lastModified)}
                                                </span>
                                                {doc.downloadPath && (
                                                    <span style={{fontSize: '0.7rem', color: '#10b981', display: 'flex', alignItems: 'center', gap: '4px', fontWeight: 600}}>
                                                        <Icon name="check-circle" size={10} /> Sync with OneDrive
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div style={{display: 'flex', gap: '8px', flexShrink: 0}}>
                                        {doc.downloadPath ? (
                                            <a 
                                                href={doc.downloadPath} 
                                                download={doc.name}
                                                className="btn btn-primary"
                                                style={{textDecoration: 'none', display: 'flex', alignItems: 'center', gap: '8px'}}
                                            >
                                                <Icon name="download" size={14} /> Download
                                            </a>
                                        ) : (
                                            <button className="btn btn-outline" onClick={() => alert(`Opening Mock Document: ${doc.name}`)}>
                                                Open
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        }) : <p className="no-docs">No enterprise documents found for this section yet.</p>}
                    </div>

                    <div className="related-links" style={{marginTop: '40px'}}>
                        <h3 className="section-title"><Icon name="link" /> Related Resources</h3>
                        <div className="card">
                            <p style={{color: 'var(--accent)', cursor: 'pointer'}}>Internal Knowledge Base Search</p>
                            <hr style={{margin: '12px 0', opacity: 0.1}} />
                            <p style={{color: 'var(--accent)', cursor: 'pointer'}}>Data Governance Portal</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeId, setActiveId] = useState('home');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [theme, setTheme] = useState('dark');

            useEffect(() => {
                document.body.setAttribute('data-theme', theme);
            }, [theme]);

            return (
                <div className="app-container">
                    <Sidebar taxonomy={taxonomy} activeId={activeId} onSelect={setActiveId} collapsed={sidebarCollapsed} />
                    <main className="main-wrapper">
                        <Navbar 
                            onToggleSidebar={() => setSidebarCollapsed(!sidebarCollapsed)} 
                            theme={theme} 
                            onToggleTheme={() => setTheme(prev => prev === 'light' ? 'dark' : 'light')} 
                        />
                        <div className="content-area">
                            {activeId === 'home' ? <Dashboard onSelect={setActiveId} /> : <ContentPage nodeId={activeId} />}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
